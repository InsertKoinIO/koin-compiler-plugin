# Enable incremental compilation (was disabled for Kotlin 2.2.x, re-enabled for 2.3.x)
kotlin.incremental=true
kotlin.incremental.multiplatform=true
# Disable incremental compilation for JS as per https://youtrack.jetbrains.com/issue/KT-82395
# e: java.lang.IllegalStateException: No file found for source null
# This happened because there is a compiler plugin which generates new top-level declarations
# and the incremental compilation is enabled.
kotlin.incremental.js=false
kotlin.incremental.js.klib=false